<!-- Forest_apps/operations/templates/operations.html -->
{% extends "base.html" %}

{% block title %}Техпроцессы{% endblock %}

{% block header %}Управление техпроцессами{% endblock %}

{% block content %}
<div class="operations-dashboard">
    <!-- Кнопка Типы операций (на всю ширину) -->
    <div class="full-width-button-container">
        <a href="{% url 'operations:operation_type_list' %}" class="full-width-button">
            <span class="button-icon">⚙️</span>
            <span class="button-text">Типы операций</span>
        </a>
    </div>

    <!-- Кнопка Учет операций (на всю ширину) -->
    <div class="full-width-button-container">
        <a href="{% url 'operations:operation_record_list' %}" class="full-width-button">
            <span class="button-icon">📊</span>
            <span class="button-text">Учет операций</span>
        </a>
    </div>
</div>

<style>
    .operations-dashboard {
        padding: 20px;
        max-width: 800px;
        margin: 0 auto;
    }

    /* Контейнер для кнопки на всю ширину */
    .full-width-button-container {
        width: 100%;
        margin-bottom: 20px;
    }

    /* Стиль прямоугольной кнопки на всю ширину */
    .full-width-button {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        padding: 25px 20px;
        background: #2c5e2e;  /* Сплошной зеленый цвет */
        border-radius: 12px;    /* Совсем немного скругления, как в оригинале */
        text-decoration: none;
        color: white;
        transition: background-color 0.3s;
        gap: 15px;
        border: none;
    }

    .full-width-button:hover {
        background: #1e4220;  /* Темнее при наведении */
    }

    .button-icon {
        font-size: 32px;
        line-height: 1;
    }

    .button-text {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 0.5px;
    }

    /* Для мобильных устройств */
    @media (max-width: 768px) {
        .operations-dashboard {
            padding: 10px;
        }

        .full-width-button {
            padding: 20px 15px;
        }

        .button-icon {
            font-size: 28px;
        }

        .button-text {
            font-size: 18px;
        }
    }
</style>
{% endblock %}
